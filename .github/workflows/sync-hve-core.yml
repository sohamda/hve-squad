name: Sync and Adapt

# Runs every morning at 06:00 UTC or on demand.
#
# What it does:
#   1. Gets the latest deployment SHA from microsoft/hve-core.
#   2. Reads the SHA currently pinned in apm.yml (from the first hve-core entry).
#   3. Skips if already up to date (unless force=true).
#   4. Runs Update-ApmDependencies.ps1 -Ref <new_sha>, which:
#        - clones microsoft/hve-core at that exact SHA
#        - rewrites all microsoft/hve-core entries with the new SHA
#        - leaves squad entries pointing at the default upstream slug
#   5. Bumps the patch version in apm.yml.
#   6. Prepends a CHANGELOG entry for the new version.
#   7. Commits apm.yml and CHANGELOG.md and pushes to main.
#   8. Dispatches release.yml to cut the tag and GitHub Release
#      (required because GITHUB_TOKEN-authored pushes do not trigger workflows).
#
# No local hve-core mirror involved — all content is referenced directly
# from microsoft/hve-core at a pinned commit SHA.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if hve-core SHA is already current'
        type: boolean
        default: false
      dry_run:
        description: 'Print what would change without committing'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-and-adapt:
    name: Sync hve-core SHA + adapt paths
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # ── Resolve latest hve-core commit SHA (tip of main) ─────────────────
      - name: Get latest hve-core commit SHA
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api 'repos/microsoft/hve-core/commits/main' --jq '.sha')
          SHORT_SHA=${SHA:0:7}
          echo "sha=$SHA"             >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Latest hve-core commit: ${SHORT_SHA} (${SHA})"

      # ── Read SHA currently pinned in apm.yml ─────────────────────────────
      - name: Read current pinned SHA
        id: current
        run: |
          # Grab the SHA from the first microsoft/hve-core entry (after the #)
          SHA=$(grep -m1 'microsoft/hve-core/.*#' apm.yml | sed 's/.*#//' | tr -d '[:space:]' || true)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Current pinned SHA: ${SHA:-<none>}"

      # ── Skip if already up to date ────────────────────────────────────────
      - name: Check if update is needed
        id: check
        run: |
          CURRENT="${{ steps.current.outputs.sha }}"
          LATEST="${{ steps.latest.outputs.sha }}"
          FORCE="${{ inputs.force }}"
          if [[ "$CURRENT" == "$LATEST" && "$FORCE" != "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "apm.yml already pinned to ${{ steps.latest.outputs.short_sha }} — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Update needed: ${CURRENT:-<none>} → ${{ steps.latest.outputs.short_sha }}"
          fi

      # ── Regenerate apm.yml at the new SHA ────────────────────────────────
      #    Script clones microsoft/hve-core at the SHA, rewrites all entries,
      - name: Regenerate apm.yml dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          ARGS=(-Ref "${{ steps.latest.outputs.sha }}")
          [[ "${{ inputs.dry_run }}" == "true" ]] && ARGS+=(-DryRun)
          pwsh scripts/Update-ApmDependencies.ps1 "${ARGS[@]}"

      # ── Bump patch version in apm.yml ─────────────────────────────────────
      - name: Bump patch version
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != 'true'
        id: bump
        run: |
          CURRENT=$(grep '^version:' apm.yml | sed 's/version:[[:space:]]*//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/^version: .*/version: $NEW_VER/" apm.yml
          echo "version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW_VER"

      # ── Prepend CHANGELOG entry ────────────────────────────────────────────
      - name: Update CHANGELOG
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.version }}"
          TODAY=$(date -u +%Y-%m-%d)
          SHORT_SHA="${{ steps.latest.outputs.short_sha }}"
          FULL_SHA="${{ steps.latest.outputs.sha }}"
          REPO="${{ github.repository }}"
          cat > /tmp/changelog_entry.md <<EOF
          ## [$NEW_VERSION] - $TODAY

          ### Changed

          - Updated hve-core dependency pin to \`$SHORT_SHA\` ($FULL_SHA).

          ### Consumer install

          Pin to this version:

          \`\`\`powershell
          apm install "$REPO#v$NEW_VERSION"
          \`\`\`

          [$NEW_VERSION]: https://github.com/$REPO/releases/tag/v$NEW_VERSION

          EOF
          awk 'BEGIN{done=0}
               /^## \[/ {
                 if (!done) {
                   while ((getline line < "/tmp/changelog_entry.md") > 0) print line;
                   done=1
                 }
               }
               { print }' CHANGELOG.md > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      # ── Commit and push ───────────────────────────────────────────────────
      - name: Commit and push
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add apm.yml CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): bump to ${{ steps.bump.outputs.version }} with hve-core@${{ steps.latest.outputs.short_sha }}"
            git push origin main
            echo "::notice::Pushed release bump to v${{ steps.bump.outputs.version }} (hve-core@${{ steps.latest.outputs.short_sha }})"
          else
            echo "::notice::No changes after regeneration — nothing to commit."
          fi

      # ── Dispatch release workflow ───────────────────────────────────────────
      # GITHUB_TOKEN-authored pushes do not trigger other workflows, so we
      # dispatch release.yml explicitly. It will read the new version from
      # apm.yml and cut the tag + GitHub Release.
      - name: Trigger release
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --ref main
          echo "::notice::Triggered release.yml for v${{ steps.bump.outputs.version }}"

