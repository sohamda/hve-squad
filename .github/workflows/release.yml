name: Release

# Triggers:
#   workflow_dispatch — supply a version; workflow updates apm.yml, regenerates
#                       pinned deps, commits, and creates the GitHub Release.
#   push to main      — reads version from apm.yml; creates a GitHub Release if
#                       a matching tag does not exist yet. Expects the CHANGELOG
#                       to already contain an entry for that version.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.8.2) — updates apm.yml and regenerates deps'
        required: true
        type: string
      hve_core_ref:
        description: 'hve-core git ref for dependency pinning (branch, tag, or commit SHA)'
        required: false
        default: 'main'
        type: string
      draft:
        description: 'Create as a draft release (review before publishing)'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'apm.yml'
      - 'CHANGELOG.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    # Skip commits that were authored by this workflow to prevent push-loop.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       !startsWith(github.event.head_commit.message, 'chore(release):'))
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      # ── Resolve version ───────────────────────────────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version:' apm.yml | sed 's/version:[[:space:]]*//')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"

      # ── Guard: skip if tag already exists (e.g. re-run, stale push) ──────
      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Manual dispatch only: update apm.yml + regenerate pinned deps ─────
      - name: Update apm.yml version
        if: >
          github.event_name == 'workflow_dispatch' &&
          steps.tag_check.outputs.exists == 'false'
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}/" apm.yml

      - name: Regenerate pinned dependencies
        if: >
          github.event_name == 'workflow_dispatch' &&
          steps.tag_check.outputs.exists == 'false'
        run: |
          pwsh scripts/Update-ApmDependencies.ps1 \
            -Ref        "${{ inputs.hve_core_ref }}" \
            -SquadRef   "${{ steps.version.outputs.tag }}" \
            -HveCoreRef "${{ steps.version.outputs.tag }}"

      - name: Commit and push changes
        if: >
          github.event_name == 'workflow_dispatch' &&
          steps.tag_check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          if ! git diff --quiet; then
            git add apm.yml apm.lock.yaml
            git commit -m "chore(release): bump to ${{ steps.version.outputs.version }}"
            git push origin main
          fi

      # ── Extract release notes from CHANGELOG.md ───────────────────────────
      - name: Extract CHANGELOG entry
        if: steps.tag_check.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Matches lines like "## [0.8.2] - 2026-06-17"
          NOTES=$(awk -v ver="$VERSION" \
            'BEGIN{found=0}
             $0 ~ "^## \\[" ver "\\]" {found=1; next}
             found && /^## \[/{exit}
             found{print}' CHANGELOG.md)
          if [[ -z "$NOTES" ]]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for full details."
          fi
          printf '%s' "$NOTES" > /tmp/release_notes.md

      # ── Create GitHub Release (also creates the annotated tag) ────────────
      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=(
            "${{ steps.version.outputs.tag }}"
            --title "${{ steps.version.outputs.tag }}"
            --notes-file /tmp/release_notes.md
          )
          [[ "${{ inputs.draft }}" == "true" ]] && ARGS+=(--draft)
          gh release create "${ARGS[@]}"
